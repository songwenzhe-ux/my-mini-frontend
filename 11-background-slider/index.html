<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景轮播</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
        integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog=="
        crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="slider-container">
        <div class="slide active"
        style="background-image: url('https://images.pexels.com/photos/12385392/pexels-photo-12385392.jpeg');">

        </div>
        <div class="slide "
        style="background-image: url('https://images.pexels.com/photos/32654991/pexels-photo-32654991.jpeg');">

        </div>
        <div class="slide "
        style="background-image: url('https://images.pexels.com/photos/11491014/pexels-photo-11491014.jpeg');">

        </div>
        <div class="slide "
        style="background-image: url('https://images.pexels.com/photos/36672131/pexels-photo-36672131.jpeg');">

        </div>
        <div class="slide "
        style="background-image: url('https://images.pexels.com/photos/30732757/pexels-photo-30732757.jpeg');">

        </div>
        <button class="arrow left-arrow" id="left">
            <i class="fas fa-arrow-left"></i>
        </button>
        <button class="arrow right-arrow" id="right">
            <i class="fas fa-arrow-right"></i>
        </button>
    </div>
</body>
</html>
