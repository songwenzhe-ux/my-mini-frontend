<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css" />
    <title>Incrementing Counter</title>
</head>
<body>
    <div class="counter-container">
        <i class="fa-brands fa-x-twitter" fa-3x></i>
        <div class="counter" data-target="15000"></div>
        <span>X Followers</span>
    </div>
    <div class="counter-container">
        <i class="fa-brands fa-youtube" fa-3x></i>
        <div class="counter" data-target="10000"></div>
        <span>YouTube Followers</span>
    </div>
    <div class="counter-container">
        <i class="fa-brands fa-facebook" fa-3x></i>
        <div class="counter" data-target="5000"></div>
        <span>Facebook Followers</span>
    </div>
</body>
<script src="script.js"></script>
</html>
